name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  # Build Android Project
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run unit tests
        run: ./gradlew test

  # Build Backend Project and Docker Image
  build-backend:
    name: Build Spring Boot Backend & Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Build Backend Jar
        run: ./gradlew :backend:bootJar

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-service
          path: backend/build/libs/*.jar

      # Build and Push Docker Image (Optional: Only on Push to Main or Tags)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/otp-backend:latest
            ghcr.io/${{ github.repository_owner }}/otp-backend:${{ github.sha }}

  # Create GitHub Release (Triggered on Tags like v1.0.0)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-backend]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-service

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
